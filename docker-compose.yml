services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tagly
      POSTGRES_USER: tagly
      POSTGRES_PASSWORD: tagly_dev
    # Host port (right side stays 5432 inside the network). Override if 5432 is taken, e.g. system PostgreSQL on Raspberry Pi.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host port (container still listens on 6379). Override if 6379 is taken, e.g. system Redis on Raspberry Pi.
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8008:8008"
    environment:
      DB_NAME: tagly
      DB_USER: tagly
      DB_PASSWORD: tagly_dev
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      # Use `*` for local dev; on Cloudflare set explicit hosts in `.env` (see .env.example).
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      HOST_IP: "${HOST_IP:-192.168.0.150}"
      # Loaded from project `.env` when present (`docker compose` substitutes variables).
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-only-secret-key}"
      # MUST include `https://tagly.brandstaetter.rocks` when the SPA is served there — set in `.env` or CORS fails in the browser.
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://${HOST_IP:-192.168.0.150}:5173,http://${HOST_IP:-192.168.0.150}:8008}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://${HOST_IP:-192.168.0.150}:5173,http://${HOST_IP:-192.168.0.150}:8008}"
      # Set to 1 in project `.env` on hosts behind Cloudflare Tunnel (HTTPS at edge, HTTP to container).
      DJANGO_BEHIND_HTTPS_PROXY: "${DJANGO_BEHIND_HTTPS_PROXY:-0}"
      LOGIN_THROTTLE_RATE: "${LOGIN_THROTTLE_RATE:-30/minute}"
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8008
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8008/api/v1/health/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  celery_worker:
    build: ./backend
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_NAME: tagly
      DB_USER: tagly
      DB_PASSWORD: tagly_dev
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-only-secret-key}"
    volumes:
      - ./backend:/app
    command: celery -A tagly worker -l info --concurrency=2

  celery_beat:
    build: ./backend
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_NAME: tagly
      DB_USER: tagly
      DB_PASSWORD: tagly_dev
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-only-secret-key}"
    volumes:
      - ./backend:/app
    command: celery -A tagly beat -l info

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      # Default: same-origin API via Vite proxy → backend (one tunnel to :5173 is enough). Set VITE_API_URL to a full
      # https URL only if you intentionally call a separate API host (then CORS + second tunnel must work).
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:8008}
      # Optional: fix Vite HMR WebSocket when the dev server is reached via tunnel (public hostname, no https://).
      VITE_DEV_PUBLIC_HOST: ${VITE_DEV_PUBLIC_HOST:-}
      # Optional: full public origin if not https://$VITE_DEV_PUBLIC_HOST (rare).
      VITE_DEV_PUBLIC_ORIGIN: ${VITE_DEV_PUBLIC_ORIGIN:-}
      VITE_DEV_HMR_CLIENT_PORT: ${VITE_DEV_HMR_CLIENT_PORT:-443}
      VITE_DEV_HMR_PROTOCOL: ${VITE_DEV_HMR_PROTOCOL:-wss}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  frontend_node_modules:
